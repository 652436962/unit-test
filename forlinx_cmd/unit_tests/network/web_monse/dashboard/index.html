<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RV1126设备监控仪表盘</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- 头部导航 -->
        <header class="dashboard-header">
            <h1>🎯 RV1126智能设备监控平台</h1>
            <div class="header-info">
                <span id="connection-status" class="status-connected">● 已连接</span>
                <span id="current-time"></span>
            </div>
        </header>

        <!-- 主要仪表盘区域 -->
        <main class="dashboard-main">
            <!-- 系统状态卡片 -->
            <section class="status-cards">
                <div class="card cpu-card">
                    <div class="card-header">
                        <h3>🖥️ CPU状态</h3>
                        <div class="card-value" id="cpu-usage">--%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="cpu-progress"></div>
                    </div>
                </div>

                <div class="card memory-card">
                    <div class="card-header">
                        <h3>💾 内存使用</h3>
                        <div class="card-value" id="memory-usage">--%</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="memory-progress"></div>
                    </div>
                </div>

                <div class="card temp-card">
                    <div class="card-header">
                        <h3>🌡️ 设备温度</h3>
                        <div class="card-value" id="temperature">--°C</div>
                    </div>
                    <div class="temperature-gauge" id="temp-gauge"></div>
                </div>

                <div class="card ai-card">
                    <div class="card-header">
                        <h3>🤖 AI推理</h3>
                        <div class="card-value" id="ai-count">--</div>
                    </div>
                    <div class="card-description">总推理次数</div>
                </div>
            </section>

            <!-- 图表区域 -->
            <section class="charts-section">
                <div class="chart-card">
                    <h3>📈 性能趋势</h3>
                    <canvas id="performance-chart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>🎯 AI检测统计</h3>
                    <canvas id="ai-chart"></canvas>
                </div>
            </section>

            <!-- 控制面板 -->
            <section class="control-panel">
                <h3>⚙️ 设备控制</h3>
                <div class="control-grid">
                    <button class="control-btn primary" onclick="startAI()">
                        🚀 启动AI推理
                    </button>
                    <button class="control-btn secondary" onclick="stopAI()">
                        ⏹️ 停止推理
                    </button>
                    <button class="control-btn warning" onclick="rebootDevice()">
                        🔄 重启设备
                    </button>
                    <button class="control-btn danger" onclick="shutdownDevice()">
                        ⭕ 关机
                    </button>
                </div>
                
                <div class="config-section">
                    <h4>参数配置</h4>
                    <div class="config-item">
                        <label>置信度阈值: <span id="confidence-value">0.5</span></label>
                        <input type="range" id="confidence-slider" min="0" max="1" step="0.1" value="0.5">
                    </div>
                    <div class="config-item">
                        <label>检测频率: <span id="frequency-value">1</span> Hz</label>
                        <input type="range" id="frequency-slider" min="1" max="10" value="1">
                    </div>
                    <button class="control-btn primary" onclick="saveConfig()">
                        💾 保存配置
                    </button>
                </div>
            </section>

            <!-- 实时数据流 -->
            <section class="data-stream">
                <h3>📊 实时数据流</h3>
                <div class="stream-container" id="data-stream">
                    <div class="stream-item">等待数据连接...</div>
                </div>
            </section>
        </main>

        <!-- 底部状态栏 -->
        <footer class="dashboard-footer">
            <div class="footer-info">
                <span>设备运行时间: <span id="uptime">--</span></span>
                <span>最后检测: <span id="last-detection">--</span></span>
                <span>系统版本: v1.0.0</span>
            </div>
        </footer>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
